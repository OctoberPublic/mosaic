<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8" /><title>test-hold</title>
<style>body{margin:0;background:#0f1117;color:#e9edf3;font-family:system-ui,sans-serif}
#status{padding:6px 10px;font-size:12px;white-space:pre-wrap}#c{width:360px;height:360px;display:block}</style>
</head>
<body>
<div id="status">running…</div>
<canvas id="c"></canvas>
<script type="module">
import { Renderer } from '../js/render.js';
import { Game } from '../js/game.js';
import { UNKNOWN, EMPTY } from '../js/solver.js';

const W = 12, H = 12, N = W * H;
const mask = new Uint8Array(N).fill(1);
const solution = new Uint8Array(N);
for (let y = 2; y <= 9; y++) for (let x = 2; x <= 9; x++) if ((x + y) % 2 === 0) solution[y * W + x] = 1;
const clues = new Int8Array(N).fill(-1);
for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
  let c = 0;
  for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
    const nx = x + dx, ny = y + dy;
    if (nx >= 0 && ny >= 0 && nx < W && ny < H && solution[ny * W + nx]) c++;
  }
  clues[y * W + x] = c;
}
const puzzle = { width: W, height: H, mask, clues, solution, difficulty: 'normal' };

const canvas = document.getElementById('c');
const renderer = new Renderer(canvas, {
  onPaintStart: (cell, useCross) => game.startPaint(cell, useCross),
  onPaintMove: (cell) => game.paintMove(cell),
  onPaintEnd: () => game.endPaint(),
});
const game = new Game({ onChange: () => renderer.requestDraw(), onClear: () => {} });
game.setTool('fill');

function loadFresh() {
  game.setPuzzle(puzzle);
  renderer.setPuzzle(puzzle);
  renderer.setMarks(game.marks);
  renderer.setErrors(game.errors);
}
loadFresh();

const countMarks = () => { let n = 0; for (const m of game.marks) if (m !== UNKNOWN) n++; return n; };
const countEmpty = () => { let n = 0; for (const m of game.marks) if (m === EMPTY) n++; return n; };
const rect = () => canvas.getBoundingClientRect();
function pe(type, lx, ly, opts = {}) {
  const r = rect();
  return new PointerEvent(type, { pointerId: 1, isPrimary: true, pointerType: 'touch', bubbles: true, cancelable: true, clientX: r.left + lx, clientY: r.top + ly, button: 0, ...opts });
}
function drag(x1, y1, x2, y2) {
  canvas.dispatchEvent(pe('pointerdown', x1, y1));
  canvas.dispatchEvent(pe('pointermove', (x1 + x2) / 2, (y1 + y2) / 2));
  canvas.dispatchEvent(pe('pointermove', x2, y2));
  canvas.dispatchEvent(pe('pointerup', x2, y2));
}

const res = [];
const check = (n, c) => res.push((c ? 'PASS ' : 'FAIL ') + n);

// 1) ツール未選択(ボタン未押下) → スワイプで移動、塗られない
renderer.setActiveTool(null);
const ox0 = renderer.originX;
drag(120, 120, 180, 120);
check('未押下:盤面が移動する', Math.abs(renderer.originX - ox0) > 10);
check('未押下:塗られない', countMarks() === 0);

// 2) fill 押下中 → 塗れる、移動しない
loadFresh();
renderer.setActiveTool('fill');
const ox1 = renderer.originX;
drag(120, 120, 160, 120);
check('塗る押下:塗られる', countMarks() > 0);
check('塗る押下:移動しない', renderer.originX === ox1);

// 3) cross 押下中 → ×が付く
loadFresh();
renderer.setActiveTool('cross');
drag(120, 160, 160, 160);
check('印押下:×が付く', countEmpty() > 0);

document.getElementById('status').textContent = res.join('\n');
document.title = res.every((r) => r.startsWith('PASS')) ? 'ALL-PASS' : 'HAS-FAIL';
</script>
</body>
</html>

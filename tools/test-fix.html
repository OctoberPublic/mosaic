<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8" /><title>test-fix</title>
<style>.invisible{visibility:hidden}</style>
</head>
<body>
<div id="status">running…</div>
<button id="fixBtn" class="invisible">直す</button>
<script type="module">
import { Game } from '../js/game.js';

// 3x3 十字
const W = 3, H = 3, N = 9;
const mask = new Uint8Array(N).fill(1);
const solution = Uint8Array.from([0, 1, 0, 1, 1, 1, 0, 1, 0]);
const clues = new Int8Array(N).fill(-1);
for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
  let c = 0;
  for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
    const nx = x + dx, ny = y + dy;
    if (nx >= 0 && ny >= 0 && nx < W && ny < H && solution[ny * W + nx]) c++;
  }
  clues[y * W + x] = c;
}
const puzzle = { width: W, height: H, mask, clues, solution, difficulty: 'normal' };

const fixBtn = document.getElementById('fixBtn');
// main.js と同じ配線
function updateFix() { fixBtn.classList.toggle('invisible', !game.hasErrors()); }
const game = new Game({ onChange: () => updateFix(), onClear: () => {} });
game.setPuzzle(puzzle);
fixBtn.addEventListener('click', () => game.resetAroundErrors());
updateFix();

const res = [];
const check = (n, c) => res.push((c ? 'PASS ' : 'FAIL ') + n);

check('初期は直すボタン非表示', fixBtn.classList.contains('invisible'));
// 角ヒント0(値3, 近傍0,1,3,4)を到達不能にして間違いを作る
game.setTool('cross');
game.tap(1, false); game.tap(3, false); game.tap(4, false);
check('間違い発生で直すボタンが表示', !fixBtn.classList.contains('invisible'));
// ボタンクリックでリセット
fixBtn.click();
check('クリックで間違い解消', !game.hasErrors());
check('リセット後は直すボタン非表示', fixBtn.classList.contains('invisible'));

document.getElementById('status').textContent = res.join(' | ');
document.title = res.every((r) => r.startsWith('PASS')) ? 'ALL-PASS' : 'HAS-FAIL';
</script>
</body>
</html>
